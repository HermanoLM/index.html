<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>para Samantha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     VARIABLES & RESET
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:    #f5efe6;
    --blush:    #e8c4b0;
    --rose:     #c47a6a;
    --deep:     #2a1f1a;
    --gold:     #c9a96e;
    --gold-soft: rgba(201,169,110,0.18);
    --white:    #ffffff;
    --overlay:  rgba(20, 10, 8, 0.55);
    /* Per-letter accent colors for poems */
    --accent-S: #c9a96e;
    --accent-A: #e8c4b0;
    --accent-M: #c47a6a;
    --accent-N: #b0c4d8;
    --accent-T: #a8c4a2;
    --accent-H: #d4a8c7;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Raleway', sans-serif;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }

  /* Grain overlay for depth */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    mix-blend-mode: overlay;
  }

  /* ============================================================
     SHARED BACKGROUND — change 'tu-imagen.jpg' to your photo path
  ============================================================ */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('bg.jpg.png'); /* ← PON AQUÍ LA RUTA DE TU IMAGEN */
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    /* fallback gradient if no image is set */
    background-color: #1a0f0b;
    transition: background-image 0.8s ease;
  }
  .bg-layer.message-bg {
    background-image: url('fondo.png');
  }
  .bg-layer.end-bg {
    background-image: url('fondo2.png');
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: var(--overlay);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .bg-overlay.glow {
    animation: glowPulse 2.4s ease-out both;
  }

  @keyframes glowPulse {
    0% { background: rgba(20,10,8,0.55); }
    50% { background: rgba(255,255,255,0.14); }
    100% { background: rgba(20,10,8,0.55); }
  }

  /* ============================================================
     PHASE 1 — COUNTDOWN SCREEN
  ============================================================ */
  #phase-wait {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.4rem;
    padding: 2rem;
    transition: opacity 1.2s ease;
  }
  #phase-wait.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .label-for {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 7vw, 3.2rem);
    color: var(--cream);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    animation: fadeSlideUp 1.4s ease both;
  }

  /* Countdown clock */
  .clock-wrapper {
    display: flex;
    gap: clamp(0.8rem, 3vw, 2rem);
    align-items: flex-start;
    animation: fadeSlideUp 1.6s 0.2s ease both;
  }
  .clock-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }
  .clock-number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 14vw, 6.5rem);
    color: var(--cream);
    line-height: 1;
    text-shadow: 
      0 0 12px rgba(201,169,110,0.9),
      0 0 40px rgba(201,169,110,0.45),
      0 0 80px rgba(201,169,110,0.2),
      0 2px 16px rgba(0,0,0,0.6);
    min-width: 2ch;
    text-align: center;
    letter-spacing: -0.01em;
    animation: candleFlicker 3.5s ease-in-out infinite alternate;
  }

  @keyframes candleFlicker {
    0%   { text-shadow: 0 0 12px rgba(201,169,110,0.9), 0 0 40px rgba(201,169,110,0.45), 0 0 80px rgba(201,169,110,0.2), 0 2px 16px rgba(0,0,0,0.6); }
    30%  { text-shadow: 0 0 8px  rgba(201,169,110,0.7), 0 0 28px rgba(201,169,110,0.3), 0 0 55px rgba(201,169,110,0.15), 0 2px 16px rgba(0,0,0,0.6); }
    60%  { text-shadow: 0 0 18px rgba(201,169,110,1.0), 0 0 55px rgba(201,169,110,0.55), 0 0 90px rgba(201,169,110,0.25), 0 2px 16px rgba(0,0,0,0.6); }
    100% { text-shadow: 0 0 10px rgba(201,169,110,0.8), 0 0 35px rgba(201,169,110,0.4), 0 0 70px rgba(201,169,110,0.18), 0 2px 16px rgba(0,0,0,0.6); }
  }
  .clock-label {
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: clamp(0.55rem, 2.2vw, 0.72rem);
    color: var(--blush);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .clock-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 10vw, 4.5rem);
    color: var(--gold);
    opacity: 0.6;
    line-height: 1;
    padding-top: 0.05em;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:.6} 50%{opacity:.15} }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.85rem, 3.5vw, 1.15rem);
    color: var(--blush);
    text-align: center;
    max-width: 340px;
    line-height: 1.65;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    animation: fadeSlideUp 1.8s 0.4s ease both;
  }

  /* Floating gold particles canvas */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  #particle-canvas.active { opacity: 1; }

  /* Bloom open button — replaces plain open-btn */
  .open-btn {
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: var(--cream);
    border: 1px solid rgba(201,169,110,0.55);
    background: rgba(255,255,255,0.07);
    padding: 0.9rem 2.4rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 2px;
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    animation: fadeSlideUp 1s ease both, btnGlow 2.8s ease-in-out infinite alternate;
  }
  .open-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(201,169,110,0.12) 60%, transparent 80%);
    transform: translateX(-100%);
    transition: transform 0.7s ease;
  }
  .open-btn:hover::before { transform: translateX(100%); }
  .open-btn:hover {
    background: rgba(201,169,110,0.15);
    border-color: var(--gold);
    box-shadow: 0 0 28px rgba(201,169,110,0.25), 0 0 60px rgba(201,169,110,0.1);
    letter-spacing: 0.22em;
  }
  .open-btn.show { display: block; }

  @keyframes btnGlow {
    0%   { box-shadow: 0 0 10px rgba(201,169,110,0.1); }
    100% { box-shadow: 0 0 30px rgba(201,169,110,0.28), 0 0 60px rgba(201,169,110,0.12); }
  }

  /* Bloom burst overlay (flowers appearing on launch) */
  #bloom-overlay {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }
  .bloom-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.6);
    animation: none;
  }
  @keyframes bloomExpand {
    0%   { transform: scale(0); opacity: 0.8; }
    100% { transform: scale(8); opacity: 0; }
  }



  /* Decorative thin line */
  .deco-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    opacity: 0.5;
    animation: fadeSlideUp 2s 0.6s ease both;
  }

  /* ============================================================
     PHASE 2 — MESSAGE SCREEN
  ============================================================ */
  #phase-msg {
    position: fixed; inset: 0; z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2.2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  #phase-msg.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Single message container */
  .msg-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: 480px;
    width: 100%;
    position: relative;
  }

  .msg-line {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.1rem, 4.5vw, 1.55rem);
    color: var(--cream);
    text-align: center;
    line-height: 1.75;
    letter-spacing: 0.015em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    will-change: opacity, transform;
    white-space: pre-wrap;
  }
  .msg-line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .msg-line.exit {
    opacity: 0;
    transform: translateY(-22px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  /* Tap hint */
  .tap-hint {
    position: fixed;
    bottom: 2rem; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 2s 2s ease forwards;
    pointer-events: none;
  }
  .tap-hint span {
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0.7;
  }
  .tap-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.5;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.5);opacity:.9} }

  /* End screen */
  .end-screen {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
    padding: 2rem;
  }
  .end-screen.active { opacity: 1; pointer-events: all; }
  .end-heart {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.5rem, 6vw, 2.5rem);
    color: var(--cream);
    text-align: center;
    line-height: 1.8;
    text-shadow: 0 0 30px rgba(196,122,106,0.4), 0 2px 20px rgba(0,0,0,0.6);
    animation: heartbeat 2s ease-in-out infinite;
  }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

  /* ============================================================
     SHARED ANIMATIONS
  ============================================================ */
  @keyframes fadeSlideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; } to { opacity:1; }
  }

  /* ============================================================
     OPEN BUTTON (shown when countdown hits zero)
  ============================================================ */
  .open-btn {
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: var(--cream);
    border: 1px solid rgba(201,169,110,0.45);
    background: rgba(255,255,255,0.07);
    padding: 0.9rem 2.4rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    backdrop-filter: blur(4px);
    transition: all 0.4s ease;
    animation: fadeSlideUp 1s ease both;
  }
  .open-btn:hover { background: rgba(201,169,110,0.15); border-color: var(--gold); }
  .open-btn.show { display: block; }

  /* Progress dots */
  .progress-dots {
    position: fixed;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 25;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .progress-dots.active { opacity: 1; }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--blush);
    opacity: 0.3;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .dot.done { opacity: 0.85; transform: scale(1.3); background: var(--gold); }

  /* Taylor Swift italic style */
  .msg-swift {
    font-style: italic;
    color: var(--blush);
    font-size: clamp(1rem, 4vw, 1.35rem);
  }

  /* ── Floating meme bubbles ─────────────────────────────────── */
  .meme-bubble {
    position: fixed;
    z-index: 22;
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 3.8vw, 1.1rem);
    color: var(--cream);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,169,110,0.25);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 0.65rem 1.1rem;
    border-radius: 18px 18px 18px 4px;
    max-width: 55vw;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    line-height: 1.4;
    /* animation handled via wrapper opacity only */
    transition: opacity 0.6s ease;
  }
  .meme-bubble.show { opacity: 1; }
  .meme-bubble.hide {
    opacity: 0;
    transition: opacity 0.7s ease;
  }

  /* Tap hint during meme phase */
  .meme-tap-hint {
    position: fixed;
    bottom: 2rem; left: 0; right: 0;
    text-align: center;
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 23;
  }
  .meme-tap-hint.show { opacity: 0.6; }

  /* ============================================================
     PHASE 3 — FINAL MENU
  ============================================================ */
  .final-menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.75rem;
    max-width: 90vw;
    padding: 1rem;
  }
  .final-letter {
    min-width: 3.5rem;
    min-height: 3.5rem;
    padding: 0.9rem 1rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    font-weight: 400;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .final-letter::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--letter-color, var(--gold));
    transform: scaleX(0);
    transition: transform 0.3s ease;
    transform-origin: left;
  }
  .final-letter:hover::before,
  .final-letter:focus::before { transform: scaleX(1); }
  .final-letter:hover,
  .final-letter:focus {
    outline: none;
    transform: translateY(-6px) scale(1.04);
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2), 0 0 20px var(--letter-glow, rgba(201,169,110,0.15));
  }
  .final-menu-label {
    width: 100%;
    text-align: center;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    color: var(--blush);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    opacity: 0.7;
  }
  /* Stagger in each letter */
  .final-letter { opacity: 0; animation: letterAppear 0.5s ease forwards; }
  @keyframes letterAppear {
    from { opacity:0; transform: translateY(20px) scale(0.8); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .poem-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 35;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(14, 10, 8, 0);
    backdrop-filter: blur(0px);
    opacity: 0;
    pointer-events: none;
    transition: background 0.5s ease, backdrop-filter 0.5s ease, opacity 0.4s ease;
  }
  .poem-modal-overlay.active {
    display: flex;
    opacity: 1;
    pointer-events: all;
    background: rgba(14, 10, 8, 0.78);
    backdrop-filter: blur(8px);
  }
  .poem-modal {
    width: min(560px, 92vw);
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(12, 8, 6, 0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 2.4rem 2rem 2rem;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    color: var(--cream);
    position: relative;
    transform-origin: top center;
    transform: scaleY(0.1) translateY(-20px);
    opacity: 0;
    transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,169,110,0.3) transparent;
  }
  .poem-modal::-webkit-scrollbar { width: 4px; }
  .poem-modal::-webkit-scrollbar-track { background: transparent; }
  .poem-modal::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.3); border-radius: 2px; }
  .poem-modal-overlay.active .poem-modal {
    transform: scaleY(1) translateY(0);
    opacity: 1;
  }
  /* Fold line at top */
  .poem-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 2rem; right: 2rem;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--poem-accent, var(--gold)), transparent);
    opacity: 0.6;
  }
  /* Corner fold decoration */
  .poem-modal::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 28px 28px 0;
    border-color: transparent rgba(201,169,110,0.2) transparent transparent;
  }
  .poem-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 1.8rem;
    height: 1.8rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    color: var(--blush);
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    z-index: 1;
  }
  .poem-close:hover {
    transform: rotate(90deg) scale(1.1);
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }
  .poem-letter {
    margin-bottom: 0.2rem;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3rem, 9vw, 4.5rem);
    color: var(--poem-accent, var(--gold));
    text-align: center;
    text-shadow: 0 0 40px var(--poem-accent, var(--gold)), 0 0 80px rgba(201,169,110,0.15);
    line-height: 1;
    animation: none;
  }
  .poem-modal-overlay.active .poem-letter {
    animation: letterReveal 0.6s 0.35s ease both;
  }
  @keyframes letterReveal {
    from { opacity:0; transform: scale(0.6) rotate(-8deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }

  /* Acrostic lines — each line reveals with a stagger */
  .poem-text {
    font-family: 'Cormorant Garamond', serif;
    line-height: 2;
    letter-spacing: 0.01em;
    font-size: clamp(1rem, 3.8vw, 1.2rem);
    text-align: left;
    color: var(--cream);
    padding: 0.4rem 0 0;
  }
  .poem-acro-line {
    display: block;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    line-height: 2;
  }
  .poem-acro-line.reveal {
    opacity: 1;
    transform: translateX(0);
  }
  .poem-acro-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1em;
    font-weight: 400;
    color: var(--cream);
    flex-shrink: 0;
    line-height: 1.75;
  }
  .poem-divider {
    width: 60%;
    height: 1px;

  /* ============================================================
     CUSTOM CURSOR — sunflower (desktop only)
  ============================================================ */
  @media (pointer: fine) {

      top: 0; left: 0;

<script>
  /* ============================================================
     DEBUG MODE

     directamente. Recuerda ponerlo en `false` antes de enviárselo.
  ============================================================ */
  const DEBUG_MODE = false;

  /* ============================================================
     TARGET DATE — 25 de agosto de este año a las 7:00 AM
  ============================================================ */
  const TARGET = new Date(new Date().getFullYear(), 7, 25, 7, 0, 0); // Mes 7 = agosto

  /* ============================================================
     MESSAGES — Cada tap avanza un elemento de este arreglo
  ============================================================ */
  const messages = [

    { text: "Este año se fue rápido, y hubo días en los que no estuve tan presente como quería. Eso lo siento.", style: "" },

    { text: "Cuando pienso en ti, pienso en girasoles: insistiendo en la luz incluso cuando las nubes están ahí.", style: "" },
    { text: "Gracias por ser esa persona capaz de hacer el mundo un poco más liviano solo con estar.", style: "" },
    { text: "Me gusta cómo te preocupas, cómo defiendes lo que te importa y cómo haces que todo sea más fácil de llevar.", style: "" },
    { text: "No siempre digo lo suficiente, pero quiero que sepas que en mis mejores recuerdos estás tú.", style: "" },
    { text: "Me alegra haber encontrado una amistad tan cálida, honesta y especial como la nuestra.", style: "" },
    { text: "Te quiero mucho. Y deseo con todo que cada sueño tuyo crezca como un girasol hacia algo mejor.", style: "" },
    { text: "Hoy solo quiero agradecerte por ser tú, por esos pequeños grandes momentos y por dejarme estar cerca.", style: "" },

    // ── Cierre ───────────────────────────────────────────────────
    { text: "Tal vez no sea tu persona favorita, pero sí quiero ser de las que no fallan.", style: "" },
    { text: "Cuando sientas que todo se cae y necesites a alguien que simplemente esté, aquí voy a estar.", style: "" },
    { text: "Sin preguntas. Sin condiciones. Siempre estaré del lado donde brilla la luz.", style: "" },
    { text: "Feliz cumpleaños, Samantha. Gracias por ser como eres.", style: "" },
  ];

  const acrosticPoems = {
    S: {
      color: '#c9a96e',
      lines: [
        { initial: 'S', rest: 'iempre hay un instante en que los ojos se detienen y el ruido del mundo calla.' },
        { initial: 'T', rest: 'ú eres ese instante, una calma que no pide permiso pero que lo inunda todo con su autenticidad.' },
        { initial: 'C', rest: 'oincidir contigo es descubrir que la belleza de la vida no está en los grandes eventos,' },
        { initial: 's', rest: 'ino en la tregua silenciosa que se genera cuando conversamos,' },

    },

      lines: [
        { initial: 'A', rest: ' veces la vida es tan compleja como un laberinto,' },
        { initial: 'p', rest: 'ero tu presencia en mis días es la certeza a la que siempre da gusto volver.' },
        { initial: 'E', rest: 'res ese rincón de luz y complicidad, un espacio donde las palabras no se gastan porque se dicen con el corazón.' },
        { initial: 'A', rest: 'gradezco este tramo del camino compartido,' },
        { initial: 'p', rest: 'orque tenerte cerca, incluso en el silencio, hace que todo sea más bonito.' },
      ]
    },
    M: {
      color: '#c47a6a',
      lines: [
        { initial: 'M', rest: 'e importa tu universo entero: tus risas que iluminan, tus metas y también esos días grises en los que las alas pesan un poco más.' },
        { initial: 'Q', rest: 'uiero que lleves contigo la certeza absoluta de que,' },
        { initial: 'n', rest: 'o importa cómo sople el viento o qué tan difícil se ponga el paisaje,' },

    },

      color: '#e8c4b0',
      lines: [
        { initial: 'A', rest: 'preciarte es como descubrir un poema que no sabías que necesitabas leer.' },
        { initial: 'H', rest: 'e aprendido a querer tu forma de ser, esa madurez transparente' },
        { initial: 'y', rest: ' la confianza que se teje entre los dos sin necesidad de forzar nada.' },
        { initial: 'A', rest: 'unque la rutina a veces nos reclame,' },
        { initial: 'e', rest: 'l espacio que ocupas en mis pensamientos permanece intacto, porque a las personas valiosas se las cuida con el alma.' },
      ]
    },
    N: {
      color: '#b0c4d8',
      lines: [
        { initial: 'N', rest: 'o existen las casualidades en el mapa del destino;' },
        { initial: 'l', rest: 'as personas correctas llegan en el momento preciso.' },
        { initial: 'T', rest: 'u presencia no es un accidente, es el resultado de una sintonía fina, de una lealtad que se demuestra sin ruidos.' },
        { initial: 'E', rest: 'res esa persona que le aporta un sentido más profundo a la palabra amistad,' },
        { initial: 'd', rest: 'ejando una marca imborrable simplemente por el hecho de ser tú.' },
      ]
    },
    T: {
      color: '#a8c4a2',
      lines: [
        { initial: 'T', rest: 'engo la seguridad de que los hilos que nos unen a las personas verdaderas' },
        { initial: 'n', rest: 'o se cortan con la distancia ni se desgastan con el reloj.' },
        { initial: 'S', rest: 'e alimentan de la complicidad, del respeto y de saber que,' },
        { initial: 'e', rest: 'n algún lugar, hay alguien que nos piensa con bien.' },
        { initial: 'E', rest: 'res un cable a tierra increíble, un punto firme en el que se puede confiar con los ojos cerrados.' },
      ]
    },
    H: {
      color: '#d4a8c7',
      lines: [
        { initial: 'H', rest: 'abitar los días sabiendo que existes es como encontrar un refugio de cristal en medio de la tormenta.' },
        { initial: 'T', rest: 'ienes una fortaleza suave, una calidez que merece ser resguardada del frío del exterior.' },
        { initial: 'N', rest: 'unca dudes de la huella que dejas en mí;' },
        { initial: 'h', rest: 'ay personas que son un faro sin saberlo,' },
        { initial: 'y', rest: ' tu esencia tiene esa luz única que disipa cualquier sombra.' },
      ]
    },
    A3: {
      color: '#e8c4b0',
      lines: [
        { initial: 'A', rest: 'l final, cuando la jornada termina y el silencio se adueña de la noche,' },
        { initial: 'l', rest: 'o que queda es la gratitud por las almas que hacen que el viaje valga la pena.' },
        { initial: 'T', rest: 'ú estás al principio de esa lista, Sam.' },
        { initial: 'T', rest: 'e quiero muchísimo, y espero que este pequeño rincón sea un lugar al que vuelvas' },
        { initial: 'c', rest: 'ada vez que necesites recordar lo sumamente especial que eres para mí.' },
      ]
    }
  };

  /* ============================================================
     STATE
  ============================================================ */
  let currentIndex = -1;
  let isAnimating   = false;
  let phase2Active  = false;
  let autoMemeInterval = null;

  /* ============================================================
     COUNTDOWN LOGIC
  ============================================================ */
  function pad(n) { return String(n).padStart(2, '0'); }

  function updateClock() {
    const now  = Date.now();
    const diff = TARGET.getTime() - now;

    if (diff <= 0 || DEBUG_MODE) {
      clearInterval(clockInterval);
      document.getElementById('open-btn').classList.add('show');
      // Hide the timer numbers if time reached
      if (diff <= 0) {
        ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => {
          document.getElementById(id).textContent = '00';
        });
      }
      return;
    }

    const totalSecs = Math.floor(diff / 1000);
    const days  = Math.floor(totalSecs / 86400);
    const hours = Math.floor((totalSecs % 86400) / 3600);
    const mins  = Math.floor((totalSecs % 3600) / 60);
    const secs  = totalSecs % 60;

    document.getElementById('cd-days').textContent  = pad(days);
    document.getElementById('cd-hours').textContent = pad(hours);
    document.getElementById('cd-mins').textContent  = pad(mins);
    document.getElementById('cd-secs').textContent  = pad(secs);
  }

  const clockInterval = setInterval(updateClock, 1000);
  updateClock();

  // Auto-launch if DEBUG_MODE
  if (DEBUG_MODE) {
    setTimeout(() => launchPhase2(), 800);
  }

  /* ============================================================
     PARTICLE SYSTEM
  ============================================================ */
  (function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let running = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + 10,
        vx: (Math.random() - 0.5) * 0.6,
        vy: -(Math.random() * 0.8 + 0.3),
        size: Math.random() * 2.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
        life: 0,
        maxLife: Math.random() * 280 + 180,
        color: Math.random() > 0.5 ? '201,169,110' : '232,196,176',
      };
    }

    function tick() {
      if (!running) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Spawn
      if (Math.random() < 0.35) particles.push(createParticle());

      particles = particles.filter(p => p.life < p.maxLife);
      particles.forEach(p => {
        p.x += p.vx + Math.sin(p.life * 0.02) * 0.3;
        p.y += p.vy;
        p.life++;
        const progress = p.life / p.maxLife;
        const alpha = p.alpha * (1 - progress * progress);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${alpha})`;
        ctx.fill();
      });

      requestAnimationFrame(tick);
    }

    window.startParticles = function() {
      running = true;
      canvas.classList.add('active');
      tick();
    };
    window.stopParticles = function() {
      running = false;
      canvas.classList.remove('active');
    };
  })();

  /* ============================================================
     BLOOM BURST on launch
  ============================================================ */
  function triggerBloom() {
    const overlay = document.getElementById('bloom-overlay');
    const sizes = [80, 140, 210, 300];
    overlay.innerHTML = '';
    sizes.forEach((s, i) => {
      const ring = document.createElement('div');
      ring.className = 'bloom-ring';
      ring.style.cssText = `width:${s}px;height:${s}px;animation:bloomExpand ${0.9 + i*0.18}s ${i*0.12}s cubic-bezier(0.2,0.6,0.4,1) forwards;`;
      overlay.appendChild(ring);
    });
    overlay.style.opacity = '1';
    setTimeout(() => { overlay.style.opacity = '0'; overlay.innerHTML = ''; }, 1600);
  }

  /* ============================================================
     PHASE 2 LAUNCH
  ============================================================ */
  function launchPhase2() {
    triggerBloom();
    startParticles();

    // Fade out Phase 1
    const waitEl = document.getElementById('phase-wait');
    waitEl.classList.add('hidden');

    setTimeout(() => {
      waitEl.style.display = 'none';

      // Cambiar al fondo de mensajes después del contador
      const bgEl = document.querySelector('.bg-layer');
      bgEl.classList.add('message-bg');

      // Build progress dots
      const dotsEl = document.getElementById('progress-dots');
      messages.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot';
        d.id = 'dot-' + i;
        dotsEl.appendChild(d);
      });
      dotsEl.classList.add('active');

      // Activate phase 2
      const msgEl = document.getElementById('phase-msg');
      msgEl.classList.add('active');
      phase2Active = true;

      // Show first message automatically
      showNext();
    }, 1200);
  }

  /* ============================================================
     MESSAGE DISPLAY
  ============================================================ */

  // Posiciones orbitales alrededor del centro — distribuidas en anillo
  // con variación sutil para que no se vean mecánicas
  const memePositions = [
    { top: '12%',  left: '50%', transform: 'translateX(-50%)' },  // arriba centro
    { top: '22%',  left: '72%', transform: 'none'              },  // arriba derecha
    { top: '48%',  left: '78%', transform: 'none'              },  // derecha
    { top: '72%',  left: '62%', transform: 'none'              },  // abajo derecha
    { top: '75%',  left: '18%', transform: 'none'              },  // abajo izquierda
    { top: '48%',  left: '4%',  transform: 'none'              },  // izquierda
    { top: '22%',  left: '8%',  transform: 'none'              },  // arriba izquierda
    { top: '35%',  left: '55%', transform: 'none'              },  // intermedio derecha
  ];
  let memePositionIndex = 0;
  let activeMemeBubbles = [];
  let inMemePhase = false;
  let inSwiftPhase = false;

  function showNext() {
    if (isAnimating) return;
    if (currentIndex >= messages.length - 1) {
      if (inMemePhase) clearAllMemes(() => showEnd());
      else showEnd();
      return;
    }

    const nextMsg = messages[currentIndex + 1];

    // Entering meme phase
    if (nextMsg.style === 'msg-meme' && !inMemePhase) {
      inMemePhase = true;
      inSwiftPhase = false;
      // Hide normal message stage
      const textEl = document.getElementById('msg-text');
      const hintEl = document.getElementById('tap-hint');
      textEl.classList.remove('visible');
      textEl.classList.add('exit');
      hintEl.style.opacity = '0';
      document.getElementById('meme-tap-hint').classList.add('show');
      setTimeout(() => {
        currentIndex++;
        spawnMemeBubble(messages[currentIndex]);
        // Inicia auto-avance cada 3.5 segundos en la fase de memes
        startAutoMemeAdvance();
      }, 600);
      return;
    }

    // Leaving meme phase → entering cierre
    if (inMemePhase && nextMsg.style !== 'msg-meme') {
      inMemePhase = false;
      stopAutoMemeAdvance();
      document.getElementById('meme-tap-hint').classList.remove('show');
      
      // Cambiar al fondo final
      const bgEl = document.querySelector('.bg-layer');
      bgEl.classList.remove('message-bg');
      bgEl.classList.add('end-bg');
      
      clearAllMemes(() => {
        currentIndex++;
        renderNormalMessage();
      });
      return;
    }

    // Normal meme tap → spawn next bubble
    if (inMemePhase) {
      isAnimating = true;
      currentIndex++;
      spawnMemeBubble(messages[currentIndex]);
      document.getElementById('dot-' + currentIndex)?.classList.add('done');
      setTimeout(() => { isAnimating = false; }, 600);
      return;
    }

    // Normal / Swift messages
    isAnimating = true;
    const textEl = document.getElementById('msg-text');
    const hintEl = document.getElementById('tap-hint');

    if (currentIndex >= 0) {
      textEl.classList.remove('visible');
      textEl.classList.add('exit');
      setTimeout(() => {
        currentIndex++;
        renderNormalMessage();
      }, 600);
    } else {
      currentIndex++;
      renderNormalMessage();
    }
  }

  function renderNormalMessage() {
    const msg    = messages[currentIndex];
    const textEl = document.getElementById('msg-text');
    const hintEl = document.getElementById('tap-hint');
    const phaseEl = document.getElementById('phase-msg');

    // Make sure phase-msg is visible
    phaseEl.classList.add('active');

    // Reset classes
    textEl.className = 'msg-line';
    if (msg.style) textEl.classList.add(msg.style);
    textEl.innerHTML = '';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        textEl.classList.add('visible');
        typeText(textEl, msg.text, 0, () => {
          document.getElementById('dot-' + currentIndex)?.classList.add('done');
          const isLast = currentIndex === messages.length - 1;
          hintEl.style.opacity = isLast ? '0' : '1';
          isAnimating = false;
        });
      });
    });
  }

  function typeText(element, text, index, callback) {
    const nextChar = text[index];

    if (index >= text.length) {
      callback();
      return;
    }

    if (nextChar === '/') {
      element.innerHTML += '<br>';
      typeText(element, text, index + 1, callback);
      return;
    }

    element.innerHTML += nextChar;
    setTimeout(() => typeText(element, text, index + 1, callback), 28);
  }

  /* ── Auto-advance helper para memes ──────────────────────────── */
  function startAutoMemeAdvance() {
    // Detén cualquier intervalo anterior
    stopAutoMemeAdvance();
    
    // Auto-avanza cada 3.5 segundos durante la fase de memes
    autoMemeInterval = setInterval(() => {
      if (inMemePhase && !isAnimating) {
        showNext();
      }
    }, 3500);
  }

  function stopAutoMemeAdvance() {
    if (autoMemeInterval) {
      clearInterval(autoMemeInterval);
      autoMemeInterval = null;
    }
  }

  /* ── Meme bubble helpers ─────────────────────────────────────── */
  function spawnMemeBubble(msg) {
    const layer = document.getElementById('meme-layer');
    const pos   = memePositions[memePositionIndex % memePositions.length];
    memePositionIndex++;

    const bubble = document.createElement('div');
    bubble.className = 'meme-bubble';
    bubble.textContent = msg.text;
    bubble.style.top  = pos.top;
    bubble.style.left = pos.left;
    if (pos.transform !== 'none') bubble.style.transform = pos.transform;
    layer.appendChild(bubble);

    // Fade in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bubble.classList.add('show');
      });
    });

    activeMemeBubbles.push(bubble);

    // Auto-fade after 4.5s if more than 3 bubbles visible
    if (activeMemeBubbles.length > 3) {
      const old = activeMemeBubbles.shift();
      setTimeout(() => fadeBubble(old), 400);
    }
  }

  function fadeBubble(bubble) {
    bubble.classList.remove('show');
    bubble.classList.add('hide');
    setTimeout(() => bubble.remove(), 800);
  }

  function clearAllMemes(callback) {
    const bubbles = [...activeMemeBubbles];
    activeMemeBubbles = [];
    bubbles.forEach((b, i) => {
      setTimeout(() => fadeBubble(b), i * 120);
    });
    setTimeout(callback, bubbles.length * 120 + 800);
  }

  function showEnd() {
    const msgEl  = document.getElementById('phase-msg');
    const dotsEl = document.getElementById('progress-dots');
    const endEl  = document.getElementById('end-screen');
    const bgEl   = document.querySelector('.bg-layer');
    const overlayEl = document.querySelector('.bg-overlay');

    msgEl.style.opacity  = '0';
    dotsEl.style.opacity = '0';
    
    // Cambiar al fondo 2 y activar pulso de brillo
    bgEl.classList.remove('message-bg');
    bgEl.classList.add('end-bg');
    overlayEl.classList.add('glow');

    phase2Active = false;

    setTimeout(() => {
      msgEl.style.display  = 'none';
      dotsEl.style.display = 'none';
      endEl.classList.add('active');
    }, 1200);
  }

  function openPoem(key) {
    const poem = acrosticPoems[key];
    const overlay = document.getElementById('poem-overlay');
    const letterEl = document.getElementById('poem-letter');
    const textEl = document.getElementById('poem-text');
    const modalEl = overlay.querySelector('.poem-modal');

    // Set accent color
    const color = poem ? poem.color : '#c9a96e';
    modalEl.style.setProperty('--poem-accent', color);

    letterEl.textContent = key[0];

    // Build line-by-line acrostic HTML
    textEl.innerHTML = '';
    if (poem && poem.lines) {
      const divider = document.createElement('div');
      divider.className = 'poem-divider';
      textEl.appendChild(divider);

      poem.lines.forEach((line, i) => {
        const lineEl = document.createElement('div');
        lineEl.className = 'poem-acro-line';
        lineEl.textContent = line.initial + line.rest;
        textEl.appendChild(lineEl);

        // Staggered reveal
        setTimeout(() => lineEl.classList.add('reveal'), 380 + i * 140);
      });
    } else {
      textEl.textContent = 'Este poema aún está en camino.';
    }

    overlay.classList.add('active');
    overlay.focus();
  }

  function closePoem() {
    const overlay = document.getElementById('poem-overlay');
    overlay.classList.remove('active');
    // Reset reveal classes and signature after transition
    setTimeout(() => {
      overlay.querySelectorAll('.poem-acro-line').forEach(el => el.classList.remove('reveal'));
      document.getElementById('sig-path').classList.remove('draw');
    }, 500);
  }

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closePoem();
  });

  document.getElementById('poem-overlay').addEventListener('click', (event) => {
    if (event.target === event.currentTarget) closePoem();
  });

  /* ============================================================
     CUSTOM CURSOR
  ============================================================ */
  (function initCursor() {
    const el = document.getElementById('custom-cursor');
    if (!el) return;
    // Only activate on devices with a fine pointer (desktop/mouse)
    if (!window.matchMedia('(pointer: fine)').matches) return;

    let mouseX = -100, mouseY = -100;
    let curX = -100, curY = -100;
    let raf;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      el.classList.add('visible');
    });

    document.addEventListener('mouseleave', () => el.classList.remove('visible'));

    document.addEventListener('mousedown', () => el.classList.add('clicking'));
    document.addEventListener('mouseup',   () => el.classList.remove('clicking'));

    function loop() {
      // Smooth follow with lerp
      curX += (mouseX - curX) * 0.18;
      curY += (mouseY - curY) * 0.18;
      el.style.left = curX + 'px';
      el.style.top  = curY + 'px';
      raf = requestAnimationFrame(loop);
    }
    loop();
  })();

  /* ============================================================
     TAP / CLICK HANDLER
  ============================================================ */
  document.addEventListener('click', () => {
    if (phase2Active) showNext();
  });

  document.addEventListener('touchend', (e) => {
    if (phase2Active) {
      e.preventDefault();
      showNext();
    }
  }, { passive: false });
</script>
